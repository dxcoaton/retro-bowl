        <div class="gm4html5_div_class" id="gm4html5_div_id">

        <!-- Settings Toggle Button -->
        <button class="settings-toggle" onclick="toggleSettings()">⚙️ Settings</button>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">Game Settings</div>
            
            <!-- Feature 1: Volume Control -->
            <div class="settings-item">
                <label for="volumeSlider">Game Volume:</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="updateVolume(this.value)">
                <span id="volumeValue">50%</span>
            </div>
            
            <!-- Feature 2: Graphics Quality -->
            <div class="settings-item">
                <label for="graphicsQuality">Graphics Quality:</label>
                <select id="graphicsQuality" onchange="updateGraphicsQuality(this.value)">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            
            <!-- Feature 3: Auto-save Toggle -->
            <div class="settings-item">
                <label for="autoSave">Auto-save Progress:</label>
                <input type="checkbox" id="autoSave" checked onchange="toggleAutoSave(this.checked)">
            </div>
        </div>

<script>(function() {
    function fin(ok) {
        // Removed obfuscated hostname checking and redirect logic for security
        window.PokiSDK_OK = ok;
        GameMaker_Init();
    }
    window.addEventListener("load", function(_) {
        window.PokiSDK_loadState = 0;
        if (window.PokiSDK) {
            PokiSDK.init().then(function() {
            fin(true);
        }).catch(function() {
            fin(false);
        });
        } else {
            window.PokiSDK = null;
            fin(false);
        }
    });
    })();
</script>
<script>
        // Removed automatic popup for security and UX reasons
        // Users should explicitly choose to visit external sites
        
        // Settings functionality
        let settingsVisible = false;
        
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            settingsVisible = !settingsVisible;
            panel.style.display = settingsVisible ? 'block' : 'none';
        }
        
        function updateVolume(value) {
            document.getElementById('volumeValue').textContent = value + '%';
            // Store volume setting in localStorage
            localStorage.setItem('gameVolume', value);
            
            // Apply volume to game audio if available
            if (window.GameMaker_Instance && window.GameMaker_Instance.audio) {
                window.GameMaker_Instance.audio.volume = value / 100;
            }
            
            console.log('Volume updated to:', value + '%');
        }
        
        function updateGraphicsQuality(quality) {
            // Store graphics quality setting
            localStorage.setItem('graphicsQuality', quality);
            
            // Apply graphics quality settings
            const canvas = document.getElementById('canvas');
            if (canvas) {
                switch(quality) {
                    case 'low':
                        canvas.style.imageRendering = 'pixelated';
                        canvas.style.imageRendering = '-moz-crisp-edges';
                        canvas.style.imageRendering = 'crisp-edges';
                        break;
                    case 'medium':
                        canvas.style.imageRendering = 'auto';
                        break;
                    case 'high':
                        canvas.style.imageRendering = 'high-quality';
                        break;
                }
            }
            
            console.log('Graphics quality updated to:', quality);
        }
        
        function toggleAutoSave(enabled) {
            // Store auto-save setting
            localStorage.setItem('autoSave', enabled);
            
            // Set up auto-save interval if enabled
            if (enabled) {
                // Auto-save every 30 seconds
                setInterval(function() {
                    if (window.GameMaker_Instance && window.GameMaker_Instance.saveGame) {
                        window.GameMaker_Instance.saveGame();
                        console.log('Auto-save completed');
                    }
                }, 30000);
            }
            
            console.log('Auto-save', enabled ? 'enabled' : 'disabled');
        }
        
        // Load saved settings on page load
        window.addEventListener('load', function() {
            // Load volume setting
            const savedVolume = localStorage.getItem('gameVolume');
            if (savedVolume) {
                document.getElementById('volumeSlider').value = savedVolume;
                document.getElementById('volumeValue').textContent = savedVolume + '%';
            }
            
            // Load graphics quality setting
            const savedQuality = localStorage.getItem('graphicsQuality');
            if (savedQuality) {
                document.getElementById('graphicsQuality').value = savedQuality;
                updateGraphicsQuality(savedQuality);
            }
            
            // Load auto-save setting
            const savedAutoSave = localStorage.getItem('autoSave');
            if (savedAutoSave !== null) {
                const autoSaveEnabled = savedAutoSave === 'true';
                document.getElementById('autoSave').checked = autoSaveEnabled;
                toggleAutoSave(autoSaveEnabled);
            }
        });
    </script>
